name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. v0.3.0). Leave blank to use the triggering tag.'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  publish:
    name: Build + publish to PyPI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [ -n "${{ github.ref_name }}" ] && [[ "${{ github.ref_name }}" == v* ]]; then
            VERSION="${{ github.ref_name }}"
          else
            echo "::error::could not determine version (tag=${{ github.ref_name }}, input=${{ github.event.inputs.version }})"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $VERSION"

      - name: Verify tag is on main branch
        # Rule: only main can release. We enforce by requiring the tagged commit
        # to be reachable from origin/main. If a feature branch accidentally
        # gets tagged and pushed, this fails fast before any artifacts are built.
        run: |
          git fetch --no-tags origin main
          if git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "OK: $GITHUB_REF_NAME (commit $GITHUB_SHA) is reachable from origin/main"
          else
            echo "::error::tag $GITHUB_REF_NAME (commit $GITHUB_SHA) is not on main"
            echo "Policy: only main can release. Cut the tag from main, or move it:"
            echo "  git fetch origin main"
            echo "  git tag -fa \$GITHUB_REF_NAME origin/main"
            echo "  git push origin :refs/tags/\$GITHUB_REF_NAME"
            echo "  git push origin v*  # tag is now on origin/main's tip"
            exit 1
          fi

      - name: Wait for CI to pass on this SHA
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Waiting for CI workflow run on $GITHUB_SHA..."
          # CI may already be completed by the time this step runs (e.g. push tag
          # was made after main went green). Handle both cases.
          SHA="$GITHUB_SHA"
          # GitHub API needs ~5s to register a new workflow run after push
          sleep 5
          ATTEMPTS=0
          MAX_ATTEMPTS=60  # 60 * 30s = 30 min
          while [ $ATTEMPTS -lt $MAX_ATTEMPTS ]; do
            RUN_INFO=$(gh api "repos/${{ github.repository }}/actions/runs?head_sha=$SHA&workflow=CI.yml" --jq '.workflow_runs[0] | "\(.status)|\(.conclusion)"' 2>/dev/null)
            STATUS=$(echo "$RUN_INFO" | cut -d'|' -f1)
            CONCLUSION=$(echo "$RUN_INFO" | cut -d'|' -f2)
            if [ "$STATUS" = "completed" ]; then
              if [ "$CONCLUSION" = "success" ]; then
                echo "CI passed on $SHA — proceeding with release"
                exit 0
              else
                echo "::error::CI $CONCLUSION on $SHA — refusing to release"
                echo "Fix CI and re-cut the tag, or:"
                echo "  git tag -d ${{ github.ref_name }} && git tag ${{ github.ref_name }} <green-sha>"
                echo "  git push origin :refs/tags/${{ github.ref_name }} && git push origin ${{ github.ref_name }}"
                exit 1
              fi
            fi
            ATTEMPTS=$((ATTEMPTS + 1))
            echo "CI still $STATUS (attempt $ATTEMPTS/$MAX_ATTEMPTS)..."
            sleep 30
          done
          echo "::error::CI did not complete within 30 minutes on $SHA — refusing to release"
          exit 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build

      - name: Sync package version with tag (PEP 440)
        # Override the literal "0.3.0" in pyproject.toml with the tag version
        # so the wheel filename matches the tag. Use Python (not sed) for
        # cross-platform reliability (BSD vs GNU sed differ on -E behavior).
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          python3 -c "
          import os, re, pathlib
          new_version = os.environ['VERSION'].lstrip('v')
          p = pathlib.Path('pyproject.toml')
          text = p.read_text()
          new = re.sub(r'^version = .*$', f'version = \"{new_version}\"', text, count=1, flags=re.MULTILINE)
          p.write_text(new)
          print('updated version to:', new_version)
          for line in new.splitlines():
              if line.startswith('version'):
                  print(line)
          "

      - name: Save original pyproject.toml for restore
        run: cp pyproject.toml pyproject.toml.original

      - name: Sync package data + build wheel/sdist
        # The repo no longer ships a root-level agents/ or templates/
        # directory (they were inlined into louke/agents/ and
        # louke/templates/ during the v0.7 refactor on 2026-07-07), and
        # the Makefile that used to copy root -> louke/ was removed in
        # the v0.7-003 commit-batch on 2026-07-06. The package data is
        # already where the wheel expects it (louke/agents/, louke/
        # templates/, louke/.github/), so the build step is just
        # `python3 -m build`.
        run: |
          set -euo pipefail
          echo "== verifying wheel data is in place"
          test -d louke/agents  || { echo "::error::louke/agents missing"; exit 1; }
          test -d louke/templates || { echo "::error::louke/templates missing"; exit 1; }
          echo "agents:    $(ls louke/agents | wc -l) entries"
          echo "templates: $(ls louke/templates | wc -l) entries"
          echo "== building wheel + sdist"
          rm -rf dist build
          python3 -m build
          echo "built: $(ls dist/)"

      - name: Restore original pyproject.toml
        if: always()
        run: mv -f pyproject.toml.original pyproject.toml

      - name: Publish to PyPI
        # Inline twine upload instead of pypa/gh-action-pypi-publish.
        # Rationale: that action defaults to PyPI Trusted Publishing (OIDC)
        # and prefers it over the password field whenever `id-token: write`
        # permission (or the OIDC token env) is available — even when we've
        # also passed `password`. Pinning to API-token auth via the action
        # requires disabling OIDC at the PyPI project side (Trusted Publisher
        # config), which we don't have. Calling twine directly with env-set
        # token is the explicit, predictable path.
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          python -m pip install --quiet --upgrade pip
          python -m pip install --quiet twine
          python -m twine upload --skip-existing dist/louke-*.whl dist/louke-*.tar.gz

      - name: Upload artifacts to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: louke ${{ steps.version.outputs.version }}
          body_path: .github/RELEASE_NOTES_${{ steps.version.outputs.version }}.md
          fail_on_unmatched_files: false
          files: |
            dist/louke-*.whl
            dist/louke-*.tar.gz
