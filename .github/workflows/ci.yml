name: CI

on:
  push:
    branches: [main, "releases/**"]
  pull_request:
    branches: [main, "releases/**"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: build + bats (python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build

      - name: Run pre-commit on all files
        run: |
          python -m pip install pre-commit
          pre-commit run --all-files

      - name: Sync .github resources into package
        run: |
          rm -rf louke/.github
          mkdir -p louke/.github
          cp -r .github/ISSUE_TEMPLATE louke/.github/ISSUE_TEMPLATE
          cp -r .github/workflows louke/.github/workflows

      - name: Build wheel/sdist
        run: python -m build

      - name: Install wheel into a clean venv
        run: |
          python -m venv /tmp/lk-venv
          /tmp/lk-venv/bin/pip install --force-reinstall --no-deps dist/louke-*.whl

      - name: "Smoke test: lk --help"
        run: /tmp/lk-venv/bin/lk --help

      - name: Install bats-core + pyyaml for bats tests
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends bats
          # bats tests use 'python3' which on setup-python runners resolves to
          # /opt/hostedtoolcache/Python/<ver>/x64/bin/python3 (NOT /usr/bin/python3),
          # so apt-get's python3-yaml won't be picked up. Install pyyaml via pip
          # into the active python so 'import yaml' works in FORM-002/007/008/010.
          python3 -m pip install pyyaml

      - name: Run bats suite
        run: make test
