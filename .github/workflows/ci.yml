name: CI

on:
  push:
    branches: [main, "releases/**"]
  pull_request:
    branches: [main, "releases/**"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ── Lint ──────────────────────────────────────────────────────────
  # Runs once (Python 3.12). Linting is version-independent.
  lint:
    name: Lint (pre-commit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Run pre-commit on all files
        run: |
          python -m pip install --quiet pre-commit
          pre-commit run --all-files

  # ── Build ─────────────────────────────────────────────────────────
  # Builds once, uploads the wheel artifact. Dependent jobs download it.
  build:
    name: Build wheel + smoke test
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install --quiet build
      - name: Sync .github resources into package
        run: |
          rm -rf louke/.github
          mkdir -p louke/.github
          cp -r .github/ISSUE_TEMPLATE louke/.github/ISSUE_TEMPLATE
          cp -r .github/workflows louke/.github/workflows
      - name: Build wheel/sdist
        run: python -m build
      - name: Install wheel into a clean venv
        run: |
          python -m venv /tmp/lk-venv
          /tmp/lk-venv/bin/pip install --force-reinstall dist/louke-*.whl
      - name: "Package smoke: import subpackages"
        run: |
          /tmp/lk-venv/bin/python -c "import louke.runtime, louke.opencode, louke.web.api, louke.web.pages, louke.cli_v12; print('OK')"
      - name: "Package smoke: lk --version"
        run: /tmp/lk-venv/bin/lk --version | grep "0.12.1"
      - name: "Package smoke: lk --help"
        run: /tmp/lk-venv/bin/lk --help
      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: louke-wheel
          path: dist/
          retention-days: 1

  # ── pytest (all Python versions) ──────────────────────────────────
  test:
    name: pytest (python ${{ matrix.python-version }})
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Download wheel artifact
        uses: actions/download-artifact@v4
        with:
          name: louke-wheel
          path: dist/
      - name: Install wheel + test deps into clean venv
        # 'build' is needed by tests/integration/runtime/test_package_smoke.py
        # which invokes `python -m build` inside /tmp/lk-venv.
        run: |
          python -m venv /tmp/lk-venv
          /tmp/lk-venv/bin/pip install --force-reinstall dist/louke-*.whl
          /tmp/lk-venv/bin/pip install --quiet pytest pytest-cov build
      - name: Run unit + integration + ground_truth with coverage
        run: |
          /tmp/lk-venv/bin/python -m pytest tests/unit tests/integration tests/ground_truth \
            --cov=louke.runtime --cov-report=term-missing --cov-report=xml -q

  # ── bats suite (single Python version, parallel with pytest) ──────
  bats:
    name: bats suite
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Download wheel artifact
        uses: actions/download-artifact@v4
        with:
          name: louke-wheel
          path: dist/
      - name: Install wheel into clean venv (wheel brings starlette, httpx, uvicorn, pyyaml, markdown as deps)
        run: |
          python -m venv /tmp/lk-venv
          /tmp/lk-venv/bin/pip install --force-reinstall dist/louke-*.whl
      - name: Install bats-core for bats tests
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends bats
      - name: Run bats suite
        # Bats tests invoke 'python3 -m louke' via $PY. louke/__init__.py:43
        # cascades to opencode_api.py which imports starlette (a wheel dep).
        # PATH prepends /tmp/lk-venv so 'python3' resolves to the wheel venv.
        #
        # We invoke bats directly (not 'make test') because the Makefile
        # checks for .venv/bin/activate which doesn't exist in CI; only
        # /tmp/lk-venv does. If the wheel install is wrong, `python3 -m louke`
        # itself will fail with ImportError, no separate sanity check needed.
        run: |
          export PATH="/tmp/lk-venv/bin:$PATH"
          which python3
          bats tests/*.bats

  # ── AC traceability scan (non-blocking, parallel with pytest/bats) ─
  ac-scan:
    name: AC traceability scan
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Download wheel artifact
        uses: actions/download-artifact@v4
        with:
          name: louke-wheel
          path: dist/
      - name: Install wheel into clean venv
        run: |
          python -m venv /tmp/lk-venv
          /tmp/lk-venv/bin/pip install --force-reinstall dist/louke-*.whl
      - name: AC traceability scan
        # NOTE: continue-on-error because lk agent archer ci-scan reports
        # pre-existing baseline warnings:
        # (a) Unknown ACs from v0.11-001 Web IDE spec (e.g. AC-FR0001-04)
        #     that are not in the v0.12.001 acceptance scope.
        # (b) FAKE-005/006 patterns in test files outside v0.12.1 work.
        # The full audit and override rationale is in
        # docs/v0121_evidence/v0.12.1_release_audit.md section 13.
        # When the pre-existing baseline is cleaned up in v0.13, remove
        # continue-on-error.
        continue-on-error: true
        run: |
          export PATH="/tmp/lk-venv/bin:$PATH"
          if [ -d .louke/project/specs ]; then
            for spec in .louke/project/specs/*; do
              [ -d "$spec" ] || continue
              lk agent archer ci-scan --spec "$(basename "$spec")"
            done
          else
            echo "No .louke specs found; skipping louke ci-scan"
          fi
