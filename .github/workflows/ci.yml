name: CI

on:
  push:
    branches: [main, "releases/**"]
  pull_request:
    branches: [main, "releases/**"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: build + bats (python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build

      - name: Sync package data + build wheel/sdist
        run: make build

      - name: Install wheel into a clean venv
        run: |
          python -m venv /tmp/lk-venv
          /tmp/lk-venv/bin/pip install --force-reinstall --no-deps dist/louke-*.whl

      - name: "Smoke test: lk --help"
        run: /tmp/lk-venv/bin/lk --help

      - name: Install bats-core
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends bats python3-yaml

      - name: Run bats suite
        run: make test
