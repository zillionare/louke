name: Feature
description: 一个 FR 需求单元（必须 1:1 对应 spec.md 中的一个 FR-xxx 段）
title: "[FR-XXX] 简述"
labels: ["Feature"]
body:
  - type: input
    id: fr_id
    attributes:
      label: 需求 ID
      description: 与 spec.md 中的 FR 编号严格一致（3 位零填充，如 FR-001）
      placeholder: FR-001
    validations:
      required: true
      regex: "^FR-\\d{3}$"

  - type: input
    id: spec_url
    attributes:
      label: Spec 链接
      description: 完整 GitHub URL，fragment 必须小写（#fr-001，不是 #FR-001）
      placeholder: https://github.com/{owner}/{repo}/blob/{branch}/.specforge/project/specs/{spec-id}/spec.md#fr-001
    validations:
      required: true
      regex: "^https://github\\.com/[A-Za-z0-9._-]+/[A-Za-z0-9._-]+/blob/[A-Za-z0-9._/-]+/\\.specforge/project/specs/[A-Za-z0-9._-]+/spec\\.md#fr-\\d{3}$"

  - type: textarea
    id: acceptance_criteria
    attributes:
      label: 验收标准
      description: '每条 AC 单独一行，前缀 "AC-N: "（N 从 1 开始）。Probe 会逐行生成测试用例，Herald 会逐条核验。'
      placeholder: |
        AC-1: 输入合法 email 时返回 200，body 包含 status=active
        AC-2: 邮箱为空时返回 400，错误码 INVALID_EMAIL
    validations:
      required: true
