# Dogfood config: merged from louke/templates/pre-commit/base.yaml + python.yaml.
repos:
  - repo: local
    hooks:
      - id: keeper-pre-commit
        name: keeper pre-commit quality gate
        entry: python3 -m louke._tools.pre_commit --hook pre-commit
        language: system
        pass_filenames: true
        stages: [pre-commit]
      - id: keeper-commit-msg
        name: keeper commit message and trace gate
        entry: python3 -m louke._tools.pre_commit --hook commit-msg
        language: system
        stages: [commit-msg]
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.20
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v2.1.0
    hooks:
      - id: mypy
