[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "louke"
version = "0.6.2"
description = "Lòukè - 超越氛围写意，乃是工笔造物 (beyond vibes, into craft)"
readme = "README.md"
requires-python = ">=3.9"
license = { text = "MIT" }
authors = [
    { name = "louke team" }
]
keywords = ["spec-driven", "tdd", "multi-agent", "craft", "hold-point", "agent-framework"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development",
    "Topic :: Software Development :: Quality Assurance",
]

# No runtime dependencies - louke wraps stdlib-only tools

[project.scripts]
lk = "louke.__main__:main"

[project.urls]
Homepage = "https://github.com/zillionare/louke"
Repository = "https://github.com/zillionare/louke"
Issues = "https://github.com/zillionare/louke/issues"

[tool.setuptools]
packages = ["louke", "louke._tools"]

[tool.setuptools.package-data]
louke = [
    "py.typed",
    "agents/*.md",
    "templates/*.md",
    ".github/ISSUE_TEMPLATE/*.yml",
    ".github/workflows/*.yml",
]
