[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "hp"
version = "0.1.0"
description = "holdpoint CLI - 工具统一入口（每 agent 一个子命令空间）"
readme = "README.md"
requires-python = ">=3.9"
license = { text = "MIT" }
authors = [
    { name = "holdpoint team" }
]

# No runtime dependencies - hp wraps existing Python tools

[project.scripts]
hp = "hp.__main__:main"

[tool.setuptools]
packages = ["hp"]

[tool.setuptools.package-data]
hp = ["py.typed"]