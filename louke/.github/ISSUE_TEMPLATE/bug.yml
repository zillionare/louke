name: Bug
description: Report a defect or unexpected behavior in using louke
title: "[BUG] Brief summary"
labels: ["Bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Problem description
      description: Summarize the bug in one sentence, with necessary context.
      placeholder: Running `lk init` crashes with the error ...
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: |
        Provide minimal reproduction steps, ideally as a set of commands:
        1.  mkdir tmp && cd tmp
        2.  lk init foo
        3.  ...
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
      placeholder: The command runs successfully and generates ...
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened? Attach the full error output or a screenshot.
      placeholder: Terminal output ...
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: louke version
      description: Run `lk --version` or `pip show louke` to get the version.
      placeholder: 0.6.14
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.11"
    validations:
      required: false

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: macOS 15.7 / Ubuntu 22.04 / Windows 11
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Additional logs or context
      description: If you have a traceback, config file snippets, or any other context, paste it here (remember to redact secrets).
      render: shell
    validations:
      required: false
