# .louke/project/project.toml
# 当前活跃版本的元信息 + 工具配置 (fix-002 后从 project-info.md 迁移).
# 历史版本在 history.md (Markdown, agent 不解析).
#
# 读取方: Maestro / Lex / Sage / Scout / Warden / Shield
# 写入方: Scout (M-FOUND 初始化), Archer (M-ARCH [e2e]), M-MILESTONE 收尾迁移到 history.md

[project]
version = "0.8"
repo = "github.com/zillionare/louke"
project = "louke-v0.8 (#8)"
project_id = "https://github.com/users/quantclaws/projects/8"
spec_id = "v0.8-001-web-server"
release_branch = "releases/v0.10"

[meta]
created = "2026-07-05"
tag = "v0.7.3 (zillionare/louke@v0.7.3)"
current_stage = "M-DEV"
security_audit = "disabled"
smoke_test_issue = "#80 (closed, previous v0.6 milestone 冒烟)"
smoke_test_pr = "#81 (closed, M-FOUND test PR for v0.7)"
dod = "e2e 全通过 + 单元测试覆盖率 ≥95%（AC 引用闭合 58/58；未启用 Security Audit 因本项目为内部工具）"
pre_commit = "installed (python + base)"
test_framework = "pytest"
acknowledged_orphan_releases = []

story = """
给 louke 增加一个面向团队内多人协作的 web server，用于拖拽式模型绑定、wiki 浏览/编辑、以及 spec/acceptance/test-plan 等设计文档的浏览与编辑；设计文档需支持常用 Markdown 渲染、inline-discussion 的正文/讨论切换与折叠，以及 FR/NFR 卡片式渲染。
"""

[meta.known_carryover]
dirty_files = "louke 工作树里有 ~70 个 pre-existing dirty 文件 (agents/ 目录迁移、Makefile 删除等), 跟当前 spec 无关"
project_owner = "Project `louke-v0.7` (#8) owner 是 quantclaws (gh auth 限制), zillionare 已加 ADMIN"
commit_rgr = "`lk agent devon commit-rgr` 当前版本要求 `--task-id` 参数, 后续 v0.7+ 应去掉以保持 R-G-R commit 格式干净"

[active_specs]
# 当前活跃 spec 列表 (post-v0.7 hotfix)
v0_7_001 = "shipped (2026-07-05, tag v0.7.0)"
v0_7_002 = "shipped (2026-07-08, tag v0.7.3)"
v0_8_001 = "in progress (web-server)"

[e2e]
# v0.11-001 Web IDE：host-project 正式双浏览器 e2e 编排契约。
start = "python -m louke e2e start --host 127.0.0.1 --port 8765 --opencode mock"
ready = "curl -sf http://127.0.0.1:8765/health"
ready_timeout_seconds = 60
run = "python -m pytest -m e2e tests/e2e --browser chromium --browser firefox"
framework = "pytest"
browsers = ["chromium", "firefox"]
cwd = "."
# 当前已存在的 host test asset root；Shield 在其下新增 tests/e2e。
paths = ["tests", "tests/fixtures"]
teardown = "python -m louke e2e stop --port 8765 --cleanup-workspace"
