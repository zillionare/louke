spec_id = "v0.13.1-002-project-local-install-experience"
release_branch = "releases/0.13.1"

[meta]
created = "2026-07-16"
current_stage = "M-E2E"
security_audit = "disabled"
pre_commit = "installed (python + base)"
acknowledged_orphan_releases = ["releases/v0.10", "releases/v0.11", "releases/v0.4", "releases/v0.8"]
smoke_test_issue = "#207 (closed)"
smoke_test_pr = "#208 (closed)"
dod = "TBD (Sage drafts in M-SPEC)"

story = """
v0.13.1-002-project-local-install-experience：完成 v0.13.0 之后识别出的两个紧耦合缺口，使用户能在 5 分钟内把 louke 装到新项目、已有全局 louke 的用户能迁移到项目内 louke 而不动全局、release 时 louke 包版本自动与 git tag 同步。
"""
test_framework = "pytest"
backlog_project = "https://github.com/users/quantclaws/projects/10"


[active_specs]
# 当前活跃 spec 列表 (post-v0.7 hotfix)
v0_7_001 = "shipped (2026-07-05, tag v0.7.0)"
v0_7_002 = "shipped (2026-07-08, tag v0.7.3)"
v0_8_001 = "shipped (2026-07-09, v0.10 web server)"
v0_11_001 = "shipped (2026-07-11, tag v0.11.0; web-ide API + 6 sub-apps)"
v0_11_002 = "paused (web-ui-integration; superseded for new work by v0.12 Projects UI contract)"
v0_12_001 = "shipped (2026-07-15, tag v0.12.1; programmatic-workflow-runtime stabilization)"
v0_13_001 = "shipped (2026-07-16, tag v0.13.0; web-ui-foundation)"
v0_13_1_002 = "active (M-ARCH; project-local install experience + release identity sync)"

[integration]
# Bootstrap explicitly resolves the repository `.venv` on the current OS and
# rejects fallback to PATH/system Python.
paths = ["tests/e2e", "tests/integration", "tests/fixtures", "tests/ground_truth"]
run = "tests/e2e/run-project-venv integration"
framework = "pytest"
cwd = "."

[e2e]
# One parameterized runner, launched only through the project-venv bootstrap.
# `--runtime both` executes each profile from isolated local and global runtimes.
run = "tests/e2e/run-project-venv e2e --profile all --runtime both"
framework = "pytest"
cwd = "."
paths = ["tests/e2e", "tests/fixtures", "tests/ground_truth"]
